services:
  - type: web
    name: lunanusa-api
    runtime: docker
    region: singapore            # terdekat ke Indonesia
    plan: free                   # free tier (spin-down saat idle; cold start ~30-60s)
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend     # build context = backend/ agar COPY menemukan file
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://bukhorizainun.github.io,http://localhost:5173
      - key: EPHEMERIS
        value: de440s
      - key: PYTHONUNBUFFERED
        value: "1"
